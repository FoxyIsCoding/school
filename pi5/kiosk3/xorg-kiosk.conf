# Minimal X server configuration for kiosk mode
# /etc/X11/xorg.conf.d/99-kiosk.conf

Section "ServerLayout"
    Identifier "KioskLayout"
    Screen 0 "Screen0" 0 0
    Option "BlankTime" "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime" "0"
EndSection

Section "Monitor"
    Identifier "Monitor0"
    Option "DPMS" "true"
EndSection

Section "Device"
    Identifier "VideoDevice0"
    Driver "modesetting"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device "VideoDevice0"
    Monitor "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth 24
    EndSubSection
EndSection

Section "ServerFlags"
    Option "DontZap" "true"
    Option "DontVTSwitch" "true"
EndSection